<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>찬양 자동 슬라이드 v2</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>찬양 자동 슬라이드 <span>v2</span></h1>
      <p>75% 진행 후 마지막 가사 감지 · 절/후렴/슬라이드 번호 점프</p>
    </div>
    <div class="top-actions">
      <button id="btnSave" class="secondary">저장</button>
      <button id="btnLoad" class="secondary">불러오기</button>
      <button id="btnExport" class="secondary">파일 내보내기</button>
      <label class="secondary file-label">파일 가져오기<input id="importFile" type="file" accept=".autoslide,.json"></label>
      <button id="btnStart" class="primary">실행 시작</button>
    </div>
  </header>

  <main id="setupScreen" class="setup">
    <section class="card">
      <h2>1. 콘티 입력</h2>
      <p class="hint">예: 내 모습 이대로 (4) / 꽃들도 (2) 처럼 곡명 뒤에 슬라이드 수를 적어주세요.</p>
      <textarea id="contiText" rows="5">내 모습 이대로 (4)
꽃들도 (2)
은혜로다 (2)</textarea>
      <button id="btnBuild" class="primary small">콘티로 슬라이드 만들기</button>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>2. 슬라이드별 가사 입력</h2>
        <button id="btnAddSlide" class="secondary small">슬라이드 추가</button>
      </div>
      <div id="slideEditor" class="slide-editor"></div>
    </section>
  </main>

  <main id="liveScreen" class="live hidden">
    <section class="stage">
      <div class="slide-meta" id="liveMeta">1 / 1</div>
      <div class="lyrics" id="liveLyrics"></div>
    </section>

    <aside class="monitor">
      <h2>System Status</h2>
      <div class="row"><span>마이크</span><strong id="micState">OFF</strong></div>
      <div class="row"><span>현재 슬라이드</span><strong id="slideCount">0 / 0</strong></div>
      <div class="row"><span>곡</span><strong id="songTitle">-</strong></div>

      <label class="jump-label">슬라이드 번호 이동</label>
      <input id="jumpNumber" class="jump-input" type="number" min="1" placeholder="번호 입력 후 Enter">

      <div class="progress-box">
        <div class="progress-head"><span>가사 진행률</span><strong id="progressText">0%</strong></div>
        <div class="progress"><div id="progressBar"></div></div>
        <p class="hint">75% 이후 마지막 가사를 불러야 다음 슬라이드로 넘어갑니다.</p>
      </div>

      <div class="preview" id="speechPreview">음성 인식 내용이 여기에 표시됩니다.</div>

      <div class="live-buttons">
        <button id="btnPrev" class="secondary">이전</button>
        <button id="btnMic" class="primary">음성 인식 시작</button>
        <button id="btnNext" class="secondary">다음</button>
        <button id="btnBack" class="secondary">편집으로</button>
        <button id="btnProjector" class="secondary">프로젝터</button>
      </div>

      <div id="slideList" class="slide-list"></div>
    </aside>
  </main>

  <script src="data.js"></script>
  <script src="matcher.js"></script>
  <script src="storage.js"></script>
  <script src="projector.js"></script>
  <script src="speech.js"></script>
  <script src="app.js"></script>
</body>
</html>
